<nav class="px-8 py-4 border-b border-[var(--border)] flex justify-between items-center bg-white/90 backdrop-blur-md sticky top-0 z-50 shadow-sm">
  <h2 class="m-0 text-[var(--secondary)] text-xl font-bold flex items-center gap-2">
    <div class="w-7 h-7 bg-[var(--primary)] rounded-lg shadow-md shadow-indigo-500/20 flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" class="w-4 h-4"><path d="M11.7 2.805a.75.75 0 0 1 .6 0A60.65 60.65 0 0 1 22.83 8.72a.75.75 0 0 1-.231 1.337 49.948 49.948 0 0 0-9.902 3.912l-.003.002c-.114.06-.227.119-.34.18a.75.75 0 0 1-.707 0A50.88 50.88 0 0 0 7.5 12.173v-.224c0-.131.067-.248.172-.311a54.615 54.615 0 0 1 4.653-2.52.75.75 0 0 0-.65-1.352 56.123 56.123 0 0 0-4.78 2.589 1.858 1.858 0 0 0-.859 1.228 49.803 49.803 0 0 0-4.634-1.527.75.75 0 0 1-.231-1.337A60.653 60.653 0 0 1 11.7 2.805Z" /><path d="M13.06 15.473a48.45 48.45 0 0 1 7.666-3.282c.134 1.414.22 2.843.255 4.284a.75.75 0 0 1-.46.71 47.87 47.87 0 0 1-8.105 2.571.75.75 0 0 1-.832-.536 48.448 48.448 0 0 1 1.476-4.147Z" /><path d="M11.605 15.71a48.45 48.45 0 0 0-7.666-3.282c-.134 1.414-.22 2.843-.255 4.284a.75.75 0 0 0 .46.71 47.87 47.87 0 0 0 8.105 2.571.75.75 0 0 0 .832-.536 48.448 48.448 0 0 0-1.476-4.147Z" /></svg>
    </div>
    <span class="tracking-tight">SchoolSync</span>
  </h2>
  <div *ngIf="authService.currentUser$ | async as user" class="flex items-center gap-4">
    <!-- Notifications Bell -->
    <div class="relative">
      <button class="relative p-2 text-slate-500 hover:text-slate-800 rounded-full cursor-pointer focus:outline-none" (click)="toggleNotifications()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
        </svg>
        <span *ngIf="unreadCount > 0" class="absolute top-1.5 right-1.5 w-2 h-2 bg-rose-500 rounded-full"></span>
      </button>
      
      <!-- Notifications Dropdown -->
      <div *ngIf="showNotificationsDropdown" class="absolute right-0 mt-2 w-80 bg-white border border-[var(--border)] rounded-[var(--radius-md)] shadow-lg py-2 z-50">
        <h4 class="px-4 py-2 border-b border-[var(--border)] text-xs font-bold text-[var(--text-secondary)] uppercase tracking-wider">Notifications</h4>
        <div class="max-h-60 overflow-y-auto">
          <div *ngIf="notifications.length === 0" class="px-4 py-4 text-xs text-[var(--text-muted)] text-center">
            No notifications yet
          </div>
          <div *ngFor="let n of notifications" class="px-4 py-3 hover:bg-slate-50 text-xs border-b border-slate-100 last:border-0 text-[var(--text-primary)]">
            <div class="font-medium mb-0.5">{{ getNotificationText(n) }}</div>
            <div class="text-[9px] text-[var(--text-muted)]">{{ n.CreatedAt | date:'short' }}</div>
          </div>
        </div>
      </div>
    </div>

    <div class="flex items-center gap-2.5">
      <span class="text-[var(--text-secondary)] text-sm">Welcome, <strong class="text-[var(--text-primary)] font-semibold">{{ user.Name || user.name }}</strong></span>
      <span class="text-[10px] font-bold px-2.5 py-0.5 rounded-full uppercase tracking-wider" [ngClass]="{
        'bg-indigo-50 text-indigo-700 border border-indigo-100': (user.Role || user.role) === 'Student',
        'bg-emerald-50 text-emerald-700 border border-emerald-100': (user.Role || user.role) === 'Teacher',
        'bg-amber-50 text-amber-700 border border-amber-100': (user.Role || user.role) === 'Principal'
      }">{{ user.Role || user.role }}</span>
    </div>
    <button class="app-btn-secondary py-1.5 px-3.5 text-xs cursor-pointer" (click)="logout()">Logout</button>
  </div>
</nav>
<div class="p-8 max-w-7xl mx-auto">
  <router-outlet></router-outlet>
</div>
