<div class="max-w-[400px] mx-auto mt-20 px-4">
  <div class="bg-[var(--surface)] border border-[var(--border)] rounded-[var(--radius-lg)] p-8 shadow-md relative overflow-hidden">
    <!-- Top accent line -->
    <div class="absolute top-0 left-0 right-0 h-[3px] bg-gradient-to-r from-[var(--primary)] to-indigo-650"></div>
    
    <h2 class="text-center text-2xl font-bold text-[var(--text-primary)] mb-2">Sign In</h2>
    <p class="text-center text-[var(--text-secondary)] text-sm mb-6">Sign in to your SchoolSync account</p>
    
    <form (submit)="login()">
      <div class="mb-4">
        <label for="login-email" class="block text-xs font-semibold text-[var(--text-secondary)] uppercase tracking-wider mb-2">Email Address</label>
        <input id="login-email" type="email" class="app-input" [(ngModel)]="email" name="email" placeholder="e.g. student@school.edu" required>
      </div>

      <div class="mb-5">
        <label for="login-password" class="block text-xs font-semibold text-[var(--text-secondary)] uppercase tracking-wider mb-2">Password</label>
        <input id="login-password" type="password" class="app-input" [(ngModel)]="password" name="password" placeholder="••••••••" required>
      </div>
      
      <div *ngIf="error" class="text-rose-600 mb-4 text-sm p-3 bg-rose-50 border border-rose-100 rounded-xl">
        {{ error }}
      </div>
      
      <button type="submit" class="w-full app-btn-primary py-3 cursor-pointer" [disabled]="loading">
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading">Signing In...</span>
      </button>
    </form>
    
    <p class="text-center text-sm text-[var(--text-secondary)] mt-4">
      Don't have an account? 
      <a routerLink="/register" class="text-[var(--primary)] hover:underline font-semibold">Sign up</a>
    </p>
  </div>
</div>
