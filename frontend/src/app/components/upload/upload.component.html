<div class="mt-4 max-w-[600px] mx-auto px-4">
  <div class="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
    <h2 class="text-2xl font-bold text-slate-800 mb-6">Submit Document</h2>
    
    <div class="mb-5">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Select File (PDF, DOCX)</label>
      <input type="file" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white transition-all duration-300 file:mr-4 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-blue-600/10 file:text-blue-600 hover:file:bg-blue-600/20 file:cursor-pointer" (change)="onFileSelected($event)" accept=".pdf,.docx">
    </div>

    <div class="mb-5">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Document Title</label>
      <input type="text" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white transition-all duration-300" [(ngModel)]="title" placeholder="e.g. Science Project Report">
    </div>

    <div class="mb-5">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Description / Purpose</label>
      <textarea class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white transition-all duration-300" rows="3" [(ngModel)]="description" placeholder="Describe the purpose of this document (e.g. Term-end project submission for Physics class)..."></textarea>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-5">
      <div>
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Category</label>
        <select class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white transition-all duration-300 cursor-pointer" [(ngModel)]="category">
          <option value="Assignment" class="bg-white text-slate-800">Assignment</option>
          <option value="Notice" class="bg-white text-slate-800">Notice</option>
          <option value="Report" class="bg-white text-slate-800">Report</option>
          <option value="Leave Application" class="bg-white text-slate-800">Leave Application</option>
          <option value="Circular" class="bg-white text-slate-800">Circular</option>
        </select>
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Tags (comma separated)</label>
        <input type="text" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white transition-all duration-300" [(ngModel)]="tags" placeholder="e.g. urgent, class-10, term-2">
      </div>
    </div>

    <div class="mb-6">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Submit To (Teacher / Principal)</label>
      <select class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white transition-all duration-300 cursor-pointer" [(ngModel)]="targetOwnerId">
        <option *ngFor="let user of users" [value]="user.id || user.ID" class="bg-white text-slate-800">{{ user.name || user.Name }} ({{ user.email || user.Email }})</option>
      </select>
    </div>

    <div *ngIf="error" class="text-rose-600 mb-5 text-sm p-3 bg-rose-50 border border-rose-100 rounded-xl">{{ error }}</div>

    <div class="flex gap-4 mt-6">
      <button class="bg-blue-600 hover:bg-blue-500 text-white font-medium py-2.5 px-5 rounded-xl transition-all duration-300 shadow-md shadow-blue-500/10 hover:shadow-blue-500/20 cursor-pointer font-semibold" (click)="upload()">Upload & Submit</button>
      <button class="text-slate-600 hover:text-slate-850 border border-slate-300 hover:bg-slate-50 font-medium py-2.5 px-5 rounded-xl transition-all duration-300 cursor-pointer" (click)="cancel()">Cancel</button>
    </div>
  </div>
</div>
